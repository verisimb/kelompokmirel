# docker-compose.yml
# Digunakan untuk testing lokal sebelum deploy ke Coolify.
# Di Coolify, Anda menggunakan UI untuk membuat service terpisah (app + MySQL).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: spk-ewallet-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: "SPK E-Wallet"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: spk_ewallet
      DB_USERNAME: spkuser
      DB_PASSWORD: "${DB_PASSWORD}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spk-network

  db:
    image: mysql:8.0
    container_name: spk-ewallet-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: spk_ewallet
      MYSQL_USER: spkuser
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "spkuser", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - spk-network

volumes:
  app_storage:
  db_data:

networks:
  spk-network:
    driver: bridge
